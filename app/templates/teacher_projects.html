{% extends "base.html" %}

{% block title %}Проекты учителя{% endblock %}

{% block content %}
<h1>Проекты учителя</h1>
<p><a href="{{ url_for('main.teacher_project_new') }}">Создать проект</a></p>

{% if projects %}
    <ul>
        {% for project in projects %}
            <li>
                <a href="{{ url_for('main.teacher_project_detail', project_id=project.id) }}">
                    {{ project.title }}
                </a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Проектов пока нет.</p>
{% endif %}
{% endblock %}
